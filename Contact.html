<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page de Contact</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #f2f2f2;
margin: 0;
padding: 20px;
}
.contact-container {
max-width: 600px;
margin: auto;
background-color: #fff;
padding: 30px;
border-radius: 8px;
box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}
h1 {
text-align: center;
color: #003366; /* bleu foncé */
}
.detail {
margin: 15px 0;
font-size: 18px;
color: #003366; /* bleu foncé */
}
.label {
font-weight: bold;
}
a {
color: #003366; /* bleu foncé pour le lien */
text-decoration: none;
}
a:hover {
text-decoration: underline;
}
/* Responsive design */
@media (max-width: 600px) {
.contact-container {
padding: 20px;
}
}
</style>
</head>
<body>
<div class="contact-container">
<h1>Contactez-Nous</h1>
<div class="detail">
<span class="label">Email :</span> <a href="mailto:cybersecurité@lcb.org">cybersecurité@lcb.org</a>
</div>
<div class="detail">
<span class="label">Téléphone :</span> +221 77 123 45 67
</div>
<div class="detail">
<span class="label">Adresse :</span> 123 Rue de la Sécurité, Dakar, Sénégal
</div>
<div class="detail">
<span class="label">Heures d'ouverture :</span> Du lundi au vendredi, 9h - 18h
</div>
</div>
</body>
</html>
